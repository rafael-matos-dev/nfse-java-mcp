name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build e testes
        run: mvn -B clean verify
      - name: Renomear jars com a versao da tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp nfse-mcp/target/nfse-mcp.jar "nfse-mcp-${VERSION}.jar"
          cp nfse-cli/target/nfse-cli.jar "nfse-cli-${VERSION}.jar"
      - name: Criar GitHub Release com os jars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Servidor MCP e CLI da versao ${VERSION}. Veja o CHANGELOG.md. O nfse-sdk e distribuido pelo Maven Central." \
            "nfse-mcp-${VERSION}.jar" \
            "nfse-cli-${VERSION}.jar"
